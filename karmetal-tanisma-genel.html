<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanışma Soruları — Karmetal</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #FAF9F6;
    --bg-secondary: #FFFFFF;
    --bg-card: #F4F2EE;
    --text-primary: #1B2A4A;
    --text-secondary: #4A5568;
    --text-muted: #8FA093;
    --accent: #2D5016;
    --accent-dark: #1E3F0F;
    --accent-glow: rgba(45, 80, 22, 0.08);
    --accent-glow-strong: rgba(45, 80, 22, 0.15);
    --maroon: #6E1414;
    --warn: #B45309;
    --border: rgba(0,0,0,0.08);
    --border-accent: rgba(45, 80, 22, 0.25);
    --font-body: 'Instrument Sans', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { scroll-behavior:smooth; }
  body {
    font-family: var(--font-body);
    background: var(--bg-primary);
    background-image:
      linear-gradient(rgba(45,80,22,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(45,80,22,0.06) 1px, transparent 1px);
    background-size: 28px 28px;
    color: var(--text-primary);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }

  /* NAV */
  nav {
    position: sticky; top:0; z-index:100;
    padding: 0.9rem 1.4rem;
    background: rgba(250,249,246,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .logo { display:flex; align-items:baseline; gap:0.5rem; }
  .logo-main { font-size:1.15rem; font-weight:700; letter-spacing:-0.03em; }
  .logo-x { color: var(--accent); }
  .logo-sub { font-size:0.68rem; color:var(--text-muted); font-style:italic; }
  .nav-meta {
    display:flex; align-items:center; gap:0.8rem;
    font-family:var(--font-mono); font-size:0.7rem;
    color:var(--text-muted); letter-spacing:0.08em;
  }
  .section-tag {
    background: var(--accent-glow); color: var(--accent-dark);
    padding: 0.28rem 0.65rem; border-radius:4px; font-weight:700;
    border:1px solid var(--border-accent);
    white-space:nowrap;
  }
  @media (max-width:480px){ .logo-sub{display:none} }

  .progress-bar { height:3px; background:var(--border); position:sticky; top:53px; z-index:50; }
  .progress-fill { height:100%; background:var(--accent); transition:width .4s ease; width:0%; }

  main { flex:1; display:flex; align-items:flex-start; justify-content:center; padding:2.2rem 1.3rem 2rem; }
  .question-container { max-width:720px; width:100%; animation:slideIn .35s ease; padding-bottom:1rem; }
  @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

  .question-meta {
    font-family:var(--font-mono); font-size:0.68rem;
    color:var(--text-muted); letter-spacing:0.12em;
    text-transform:uppercase; margin-bottom:0.6rem;
  }
  .question-title {
    font-size: clamp(1.35rem, 3vw, 1.8rem);
    font-weight:700; letter-spacing:-0.02em;
    line-height:1.28; margin-bottom:0.5rem;
  }
  .question-title em { color:var(--accent); font-style:italic; font-weight:400; }
  .question-help { color:var(--text-secondary); font-size:0.95rem; margin-bottom:1.6rem; line-height:1.6; }

  /* PILLS */
  .pills { display:flex; flex-wrap:wrap; gap:0.6rem; }
  .pill {
    background:var(--bg-secondary); border:1.5px solid var(--border);
    border-radius:999px; padding:0.8rem 1.3rem;
    font-size:1rem; font-weight:500; cursor:pointer;
    transition:all .2s; color:var(--text-primary);
    line-height:1.4;
  }
  .pill:hover { border-color:var(--border-accent); background:var(--bg-card); }
  .pill.selected { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* VISUAL SCALE */
  .visual-scale { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:0.55rem; }
  .scale-button {
    background:var(--bg-secondary); border:1.5px solid var(--border);
    border-radius:10px; padding:0.95rem 0.6rem; cursor:pointer;
    transition:all .15s; text-align:center; font-weight:600;
  }
  .scale-button:hover { transform:translateY(-2px); border-color:var(--border-accent); }
  .scale-button.selected { background:var(--accent); color:#fff; border-color:var(--accent); }
  .scale-button-value { font-size:0.95rem; margin-bottom:0.2rem; display:block; line-height:1.3; }
  .scale-button-tag { font-size:0.68rem; color:var(--text-muted); font-weight:500; display:block; letter-spacing:0.03em; line-height:1.35; }
  .scale-button.selected .scale-button-tag { color:rgba(255,255,255,0.85); }

  /* BIG TOGGLES */
  .big-toggles { display:flex; gap:0.6rem; flex-wrap:wrap; }
  .big-toggle {
    flex:1; min-width:150px;
    background:var(--bg-secondary); border:2px solid var(--border);
    border-radius:12px; padding:1.15rem 0.8rem;
    cursor:pointer; text-align:center;
    font-size:0.92rem; font-weight:600; transition:all .2s;
    line-height:1.4;
  }
  .big-toggle:hover { border-color:var(--border-accent); transform:translateY(-2px); }
  .big-toggle.selected-good { background:var(--accent); color:#fff; border-color:var(--accent); }
  .big-toggle.selected-warn { background:var(--warn); color:#fff; border-color:var(--warn); }
  .big-toggle.selected-bad { background:var(--maroon); color:#fff; border-color:var(--maroon); }
  .big-toggle-sub { display:block; font-size:0.8rem; font-weight:500; color:var(--text-muted); margin-top:0.3rem; }
  .big-toggle.selected-good .big-toggle-sub,
  .big-toggle.selected-warn .big-toggle-sub,
  .big-toggle.selected-bad .big-toggle-sub { color:rgba(255,255,255,0.85); }

  /* DETAIL CARDS (radio) */
  .detail-cards { display:grid; grid-template-columns:1fr; gap:0.6rem; }
  @media(min-width:620px){ .detail-cards.two-col { grid-template-columns:1fr 1fr; } }
  .detail-card {
    background:var(--bg-secondary); border:1.5px solid var(--border);
    border-radius:11px; padding:0.95rem 1.05rem;
    cursor:pointer; display:grid; grid-template-columns:22px 1fr;
    gap:0.75rem; align-items:start; transition:all .15s;
  }
  .detail-card:hover { background:var(--bg-card); border-color:var(--border-accent); }
  .detail-card.checked { background:var(--accent-glow); border-color:var(--accent); }
  .detail-card-title { font-weight:600; font-size:1rem; margin-bottom:0.15rem; line-height:1.35; }
  .detail-card-sub { font-size:0.86rem; color:var(--text-muted); line-height:1.45; }
  .check-box-mini {
    width:20px; height:20px; border:2px solid var(--border-accent);
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    transition:all .15s; margin-top:3px;
  }
  .detail-card.checked .check-box-mini { background:var(--accent); border-color:var(--accent); }
  .detail-card.checked .check-box-mini::after {
    content:''; width:8px; height:8px; background:#fff; border-radius:50%;
  }

  /* CATEGORY CARDS */
  .category-cards { display:grid; grid-template-columns:1fr; gap:0.7rem; }
  @media(min-width:620px){ .category-cards { grid-template-columns:1fr 1fr; } }
  .category-card {
    background:var(--bg-secondary); border:2px solid var(--border);
    border-radius:14px; padding:1.25rem 1.15rem;
    cursor:pointer; transition:all .2s; text-align:left;
  }
  .category-card:hover { border-color:var(--border-accent); transform:translateY(-2px); box-shadow:0 6px 18px rgba(0,0,0,0.04); }
  .category-card.selected {
    border-color:var(--accent); background:var(--accent-glow);
    box-shadow:0 0 0 1px var(--accent), 0 8px 20px var(--accent-glow-strong);
  }
  .category-card-icon {
    width:42px; height:42px; background:var(--accent-glow);
    border:1px solid var(--border-accent); border-radius:10px;
    display:flex; align-items:center; justify-content:center; margin-bottom:0.65rem;
  }
  .category-card-icon svg { width:21px; height:21px; color:var(--accent); stroke-width:1.6; }
  .category-card.selected .category-card-icon { background:var(--accent); }
  .category-card.selected .category-card-icon svg { color:#fff; }
  .category-card-name { font-size:1.02rem; font-weight:700; margin-bottom:0.35rem; line-height:1.3; }
  .category-card-desc { font-size:0.84rem; color:var(--text-secondary); line-height:1.5; }

  /* ICON PILLS */
  .icon-pills { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:0.7rem; }
  .icon-pill {
    background:var(--bg-secondary); border:1.5px solid var(--border);
    border-radius:12px; padding:1.1rem 0.8rem;
    cursor:pointer; transition:all .2s; text-align:center;
    font-weight:600; font-size:0.9rem; line-height:1.35;
  }
  .icon-pill:hover { border-color:var(--border-accent); transform:translateY(-2px); }
  .icon-pill.selected { border-color:var(--accent); background:var(--accent-glow); box-shadow:0 0 0 1px var(--accent); }
  .icon-pill-svg { display:block; width:30px; height:30px; margin:0 auto 0.5rem; color:var(--text-secondary); stroke-width:1.5; transition:color .2s; }
  .icon-pill.selected .icon-pill-svg { color:var(--accent); }

  /* TAP-RANK */
  .tap-rank-container { display:flex; flex-direction:column; gap:1.2rem; }
  .tap-rank-slots { display:flex; flex-direction:column; gap:0.5rem; }
  .tap-rank-slot {
    display:flex; align-items:center; gap:0.9rem;
    background:var(--bg-secondary); border:2px dashed var(--border-accent);
    border-radius:10px; padding:0.8rem 1.05rem; min-height:54px; transition:all .2s;
  }
  .tap-rank-slot.filled { border-style:solid; background:var(--accent-glow); border-color:var(--accent); }
  .tap-rank-slot-num {
    width:30px; height:30px; background:var(--accent-glow); color:var(--accent);
    border:1.5px solid var(--border-accent); border-radius:50%;
    font-family:var(--font-mono); font-size:0.88rem; font-weight:700;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .tap-rank-slot.filled .tap-rank-slot-num { background:var(--accent); color:#fff; border-color:var(--accent); }
  .tap-rank-slot-text { color:var(--text-muted); font-style:italic; font-size:0.92rem; }
  .tap-rank-slot.filled .tap-rank-slot-text { color:var(--text-primary); font-style:normal; font-weight:600; }
  .tap-rank-pool-label {
    font-family:var(--font-mono); font-size:0.7rem; color:var(--text-muted);
    letter-spacing:0.06em; text-transform:uppercase; margin-bottom:0.5rem;
  }
  .tap-rank-pool { display:flex; flex-wrap:wrap; gap:0.55rem; }
  .tap-rank-pool .pill { position:relative; }
  .tap-rank-pool .pill.ranked { background:var(--accent); color:#fff; border-color:var(--accent); padding-left:2.2rem; }
  .tap-rank-pool .pill.ranked::before {
    content:attr(data-rank); position:absolute; left:0.5rem; top:50%; transform:translateY(-50%);
    background:#fff; color:var(--accent); border:1.5px solid var(--accent); border-radius:50%;
    width:20px; height:20px; font-family:var(--font-mono); font-size:0.7rem; font-weight:700;
    display:flex; align-items:center; justify-content:center;
  }

  /* TEXTAREA CARD */
  .textarea-card {
    background:var(--bg-secondary); border:1.5px solid var(--border);
    border-radius:14px; padding:1.15rem 1.25rem; transition:all .2s;
  }
  .textarea-card:focus-within { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
  .textarea-card textarea {
    width:100%; background:transparent; border:none; resize:vertical;
    min-height:120px; font-family:var(--font-body); font-size:1rem;
    line-height:1.65; color:var(--text-primary);
  }
  .textarea-card textarea:focus { outline:none; }
  .textarea-card textarea::placeholder { color:var(--text-muted); }
  .textarea-card-footer {
    display:flex; justify-content:space-between; align-items:center;
    padding-top:0.7rem; margin-top:0.5rem; border-top:1px dashed var(--border);
  }
  .textarea-card-hint { font-size:0.78rem; color:var(--text-muted); font-style:italic; }

  /* MINI NOTE BOX — her şıklı sorunun altı */
  .textarea-card.mini { padding:0.65rem 0.9rem; margin-top:1.15rem; border-radius:11px; }
  .textarea-card.mini textarea { min-height:48px; font-size:0.93rem; }

  @keyframes pulseBtn {
    0%,100% { box-shadow:0 0 0 0 rgba(45,80,22,.35); }
    50% { box-shadow:0 0 0 9px rgba(45,80,22,0); }
  }
  .btn-primary.pulse { animation:pulseBtn 1.2s ease infinite; }

  /* NAV BUTTONS */
  .nav-buttons { display:flex; justify-content:space-between; align-items:center; margin-top:2.2rem; gap:0.8rem; }
  .btn {
    padding:0.85rem 1.7rem; border-radius:10px; border:none; cursor:pointer;
    font-weight:600; font-size:0.95rem; transition:all .2s; font-family:var(--font-body);
  }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:var(--accent-dark); transform:translateY(-1px); box-shadow:0 6px 18px var(--accent-glow-strong); }
  .btn-back { background:transparent; color:var(--text-muted); border:1px solid var(--border); }
  .btn-back:hover { color:var(--text-primary); border-color:var(--border-accent); }
  .btn-back.invisible { visibility:hidden; }
  .btn-wa { background:var(--accent); color:#fff; width:100%; padding:1.05rem; font-size:1.05rem; font-weight:700; border-radius:12px; }
  .btn-wa:hover { background:var(--accent-dark); box-shadow:0 6px 18px var(--accent-glow-strong); }
  .btn-ghost { background:none; border:none; color:var(--text-muted); font-size:0.85rem; text-decoration:underline; text-underline-offset:3px; cursor:pointer; width:100%; margin-top:0.8rem; font-family:var(--font-body); }

  /* INTRO + SUBMITTED */
  .intro-card h1 { font-size:clamp(1.6rem,4vw,2.1rem); font-weight:700; letter-spacing:-0.02em; line-height:1.25; margin-bottom:1rem; }
  .intro-card p { color:var(--text-secondary); font-size:1rem; margin-bottom:0.9rem; max-width:56ch; }
  .intro-card .imza { font-style:italic; color:var(--text-primary); margin-top:1.1rem; }
  .intro-note {
    background:var(--accent-glow); border:1px solid var(--border-accent);
    border-radius:12px; padding:0.9rem 1.1rem; margin:1.3rem 0;
    font-size:0.88rem; color:var(--text-secondary); line-height:1.55;
  }
  .intro-note strong { color:var(--text-primary); }

  .submitted {
    text-align:center; padding:2.6rem 1.6rem;
    background:var(--bg-secondary); border:1.5px solid var(--accent);
    border-radius:16px; box-shadow:0 8px 40px var(--accent-glow-strong);
    animation:slideIn .4s ease;
  }
  .submitted-icon {
    width:68px; height:68px; margin:0 auto 1.1rem;
    background:var(--accent-glow); border:2px solid var(--accent); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }
  .submitted-icon svg { width:34px; height:34px; color:var(--accent); stroke-width:2.5; }
  .submitted h2 { font-size:1.55rem; font-weight:700; margin-bottom:0.5rem; letter-spacing:-0.02em; }
  .submitted-subtitle { color:var(--text-secondary); font-size:0.97rem; margin-bottom:1.6rem; line-height:1.6; }

  footer {
    padding:1.1rem 1.5rem; border-top:1px solid var(--border);
    text-align:center; font-size:0.76rem; color:var(--text-muted);
    font-family:var(--font-mono); letter-spacing:0.04em;
  }
</style>
</head>
<body>

<nav>
  <div class="logo">
    <span class="logo-main">Karmetal<span class="logo-x">.</span></span>
    <span class="logo-sub">tanışma soruları</span>
  </div>
  <div class="nav-meta">
    <span id="navCounter"></span>
    <span class="section-tag" id="navTag">BAŞLANGIÇ</span>
  </div>
</nav>
<div class="progress-bar"><div class="progress-fill" id="bar"></div></div>

<main><div class="question-container" id="screen"></div></main>

<footer>Cevaplarınız gizli tutulur</footer>

<script>

const LABELS = {
 tercih:'Müşteriler bizi neden seçer (sıralı)',
 sikayet:'En çok gelen serzeniş',
 dagilim:'İşin ağırlığı',
 siparis:'Siparişlerin çıkışı',
 siparis_neden:'Koşturmacanın esas sebebi',
 termin:'Teslim tarihi nasıl verilir',
 tikanma:'İşin en çok tıkandığı yer',
 ayar:'Tezgah geçişi / ayar',
 kalite:'Kalite kontrol ve kabul',
 kalite_neden:'Retler nereden çıkıyor',
 tesis:'İstanbul–Kırıkkale koordinasyonu',
 tesis_neden:'Tesisler arasında en çok aksayan',
 para:'Kazanılan işi görme',
 fiyat_nasil:'Fiyat nasıl hesaplanır',
 nakit:'Paranın sıkıştığı an',
 takip:'İş takibi',
 takip_neden:'Program neden oturmadı',
 bagli:'İşlerin bana bağlılığı',
 yoran:'Beni en çok yoran',
 beklenti:'Dışarıdan gelecek uzmandan esas beklentim',
 baslangic:'İlk nereden başlasın',
 calisma:'Nasıl çalışalım',
 tedirgin:'Beni tedirgin edebilecek şey',
 engel:'En büyük engel',
 basari:'Bir yıl sonra görmek istediğim'
};

/* ───────────────── MOTOR ───────────────── */
const answers = {};
let idx = 0;
const screen = document.getElementById('screen');

function isQ(s){ return !['intro','done'].includes(s.type); }
function condMet(s){
  if(!s.showIf) return true;
  return s.showIf.in.includes(answers[s.showIf.k]);
}
function visTotal(){ return STEPS.filter(s=>isQ(s)&&condMet(s)).length; }
function qNumber(i){
  let n=0;
  for(let j=0;j<=i;j++) if(isQ(STEPS[j])&&condMet(STEPS[j])) n++;
  return n;
}
function pad(n){return String(n).padStart(2,'0');}

function noteBox(s){
  return `<div class="textarea-card mini">
    <textarea id="taNote" placeholder="Eklemek istediğiniz olursa…">${answers[s.k+'_not']||''}</textarea>
  </div>`;
}

function metaLine(s,n){
  return `<div class="question-meta">${s.meta?s.meta+' · ':''}${pad(n)} / ${pad(visTotal())}</div>`;
}

function render(){
  const s = STEPS[idx];
  document.getElementById('navTag').textContent = s.tag;
  screen.style.animation='none'; screen.offsetHeight; screen.style.animation='';

  if(s.type==='intro'){
    document.getElementById('navCounter').textContent='';
    document.getElementById('bar').style.width='0%';
    screen.innerHTML = `
      <div class="intro-card">
        <h1>Merhaba.</h1>
        <p>Sizi ve işin gündelik akışını doğru anlamak istiyoruz. Birazdan kısa bir sohbet gibi ilerleyen sorular göreceksiniz — ekranda hep tek soru olacak, çoğunda <strong>dokunup seçmeniz</strong> yeterli.</p>
        <div class="intro-note"><strong>Doğru-yanlış yok.</strong> İçinizden nasıl geliyorsa öyle. Topu topu 5-6 dakika sürer; cevaplar gizli tutulur.</div>
        <div class="nav-buttons">
          <span></span>
          <button class="btn btn-primary" onclick="next()">Başlayalım →</button>
        </div>
      </div>`;
    return;
  }

  if(s.type==='done'){
    document.getElementById('navCounter').textContent='';
    document.getElementById('bar').style.width='100%';
    screen.innerHTML = `
      <div class="submitted">
        <div class="submitted-icon">${IC.check}</div>
        <h2>Çok teşekkür ederim.</h2>
        <p class="submitted-subtitle">Anlattıklarınız çok değerli.<br>Tek tuşla gönderin:</p>
        <button class="btn btn-wa" onclick="sendMail()">Cevapları e-posta ile gönder</button>
        <button class="btn-ghost" onclick="copyAll()">Olmadıysa: cevapları kopyala</button>
      </div>
      <div class="nav-buttons"><button class="btn btn-back" onclick="prev()">← Geri</button><span></span></div>`;
    return;
  }

  const n = qNumber(idx);
  document.getElementById('navCounter').textContent = pad(n)+' / '+pad(visTotal());
  document.getElementById('bar').style.width = ((n-1)/visTotal()*100)+'%';

  let body='';
  if(s.type==='pills'){
    body = `<div class="pills">`+s.opts.map((o,i)=>
      `<div class="pill ${answers[s.k]===o?'selected':''}" onclick="pickSingle(${i})">${o}</div>`).join('')+`</div>`;
  }
  else if(s.type==='scale'){
    body = `<div class="visual-scale">`+s.opts.map((o,i)=>
      `<div class="scale-button ${answers[s.k]===o.v?'selected':''}" onclick="pickSingle(${i})">
        <span class="scale-button-value">${o.v}</span>
        <span class="scale-button-tag">${o.t}</span></div>`).join('')+`</div>`;
  }
  else if(s.type==='toggles'){
    body = `<div class="big-toggles">`+s.opts.map((o,i)=>
      `<div class="big-toggle ${answers[s.k]===o.v?'selected-'+o.c:''}" onclick="pickSingle(${i})">
        ${o.v}<span class="big-toggle-sub">${o.s}</span></div>`).join('')+`</div>`;
  }
  else if(s.type==='detail'){
    body = `<div class="detail-cards${s.opts.length>3?' two-col':''}">`+s.opts.map((o,i)=>
      `<div class="detail-card ${answers[s.k]===o.v?'checked':''}" onclick="pickSingle(${i})">
        <div class="check-box-mini"></div>
        <div><div class="detail-card-title">${o.v}</div><div class="detail-card-sub">${o.s}</div></div></div>`).join('')+`</div>`;
  }
  else if(s.type==='category'){
    body = `<div class="category-cards">`+s.opts.map((o,i)=>
      `<div class="category-card ${answers[s.k]===o.v?'selected':''}" onclick="pickSingle(${i})">
        <div class="category-card-icon">${IC[o.ic]}</div>
        <div class="category-card-name">${o.v}</div>
        <div class="category-card-desc">${o.s}</div></div>`).join('')+`</div>`;
  }
  else if(s.type==='iconpills'){
    body = `<div class="icon-pills">`+s.opts.map((o,i)=>
      `<div class="icon-pill ${answers[s.k]===o.v?'selected':''}" onclick="pickSingle(${i})">
        <span class="icon-pill-svg">${IC[o.ic]}</span>${o.v}</div>`).join('')+`</div>`;
  }
  else if(s.type==='text'){
    body = `<div class="textarea-card">
      <textarea id="ta" placeholder="${s.ph||''}">${answers[s.k]||''}</textarea>
      <div class="textarea-card-footer"><span class="textarea-card-hint">${s.hint||''}</span></div></div>`;
  }

  const isChoice = ['pills','scale','toggles','detail','category','iconpills'].includes(s.type);

  screen.innerHTML = metaLine(s,n)
    + `<div class="question-title">${s.q}</div>`
    + (s.help?`<div class="question-help">${s.help}</div>`:'')
    + body
    + (isChoice?noteBox(s):'')
    + `<div class="nav-buttons">
        <button class="btn btn-back ${idx<=1?'invisible':''}" onclick="prev()">← Geri</button>
        <button class="btn btn-primary ${answers[s.k]?'pulse':''}" onclick="next()">Devam →</button>
      </div>`;

  if(s.type==='text'){
    const ta=document.getElementById('ta');
    ta.addEventListener('input',()=>{answers[s.k]=ta.value;});
  }
  if(isChoice){
    const tn=document.getElementById('taNote');
    if(tn) tn.addEventListener('input',()=>{answers[s.k+'_not']=tn.value;});
  }
}

function pickSingle(i){
  const s=STEPS[idx];
  const o=s.opts[i];
  answers[s.k] = (typeof o==='string')?o:o.v;
  const note = answers[s.k+'_not'];
  render();
}


function next(){
  while(idx<STEPS.length-1){
    idx++;
    if(condMet(STEPS[idx])) break;
  }
  render(); window.scrollTo(0,0);
}
function prev(){
  while(idx>0){
    idx--;
    if(condMet(STEPS[idx])) break;
  }
  render(); window.scrollTo(0,0);
}

/* ───────────────── GÖNDERİM ───────────────── */
function buildText(){
  const L=['Karmetal tanışma soruları — cevaplar:',''];
  let any=false;
  STEPS.forEach(s=>{
    if(['intro','done'].includes(s.type)) return;
    if(!condMet(s)) return;
    const a=answers[s.k];
    if(!a || (typeof a==='string' && !a.trim()) || (Array.isArray(a)&&!a.length)) return;
    any=true;
    L.push('• '+LABELS[s.k]+':');
    if(Array.isArray(a)) a.forEach((x,i)=>L.push('  '+(i+1)+'. '+x));
    else {
      let line=a.trim();
      const not=answers[s.k+'_not'];
      if(not && not.trim()) line += ' — Not: '+not.trim();
      L.push('  '+line);
    }
    L.push('');
  });
  return any?L.join('\n'):'';
}

function sendMail(){
  const t=buildText();
  if(!t){alert('Henüz cevap girilmedi.');return;}
  const subj=encodeURIComponent('Karmetal Tanışma Soruları — Cevaplar');
  window.location.href='mailto:cihangir@karmetal.net.tr?subject='+subj+'&body='+encodeURIComponent(t);
}

function copyAll(){
  const t=buildText();
  if(!t){alert('Henüz cevap girilmedi.');return;}
  const done=()=>{alert('Cevaplar kopyalandı.');};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(done).catch(()=>prompt('Kopyalayın:',t));
  } else prompt('Kopyalayın:',t);
}

render();
</script>
